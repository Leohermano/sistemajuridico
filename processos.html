<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processos — Sistema Jurídico</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="navbar">
    <h1>⚖️ Sistema Jurídico</h1>
    <div style="display:flex; gap:24px;">
      <a href="/dashboard">Dashboard</a>
      <a href="/processos">Processos</a>
      <a href="/prazos">Prazos</a>
      <a href="#" onclick="sair()">Sair</a>
    </div>
  </div>

  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h2>Processos</h2>
      <button class="btn btn-primary" style="width:auto; padding:10px 20px;" onclick="abrirForm()">+ Novo processo</button>
    </div>

    <div id="form-processo" style="display:none; background:white; padding:24px; border-radius:12px; margin-bottom:24px; box-shadow:0 2px 8px rgba(0,0,0,0.08);">
      <h2>Novo processo</h2>
      <label>Número do processo</label>
      <input type="text" id="p-numero" placeholder="0000000-00.0000.0.00.0000">
      <label>Descrição</label>
      <input type="text" id="p-descricao" placeholder="Ex: Ação de cobrança">
      <label>Vara</label>
      <input type="text" id="p-vara" placeholder="Ex: 1ª Vara Cível">
      <label>Cliente</label>
      <select id="p-cliente"></select>
      <br><br>
      <button class="btn btn-primary" style="width:auto; padding:10px 20px;" onclick="criarProcesso()">Salvar</button>
      <button class="btn btn-secondary" style="width:auto; padding:10px 20px;" onclick="fecharForm()">Cancelar</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Número</th>
          <th>Descrição</th>
          <th>Vara</th>
          <th>Status</th>
          <th>Cliente</th>
        </tr>
      </thead>
      <tbody id="corpo-processos"></tbody>
    </table>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    let clientes = [];

    async function carregarDados() {
      const [processos, clientesRes] = await Promise.all([
        fetch('/processos').then(r => r.json()),
        fetch('/clientes').then(r => r.json())
      ]);

      clientes = clientesRes;

      const select = document.getElementById('p-cliente');
      select.innerHTML = '';
      clientes.forEach(c => {
        select.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
      });

      const corpo = document.getElementById('corpo-processos');
      corpo.innerHTML = '';
      processos.forEach(p => {
        const cliente = clientes.find(c => c.id === p.cliente_id);
        corpo.innerHTML += `
          <tr>
            <td>${p.numero}</td>
            <td>${p.descricao || '-'}</td>
            <td>${p.vara || '-'}</td>
            <td>${p.status}</td>
            <td>${cliente ? cliente.nome : '-'}</td>
          </tr>`;
      });
    }

    function abrirForm() {
      document.getElementById('form-processo').style.display = 'block';
    }

    function fecharForm() {
      document.getElementById('form-processo').style.display = 'none';
    }

    async function criarProcesso() {
      const res = await fetch('/processos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          numero: document.getElementById('p-numero').value,
          descricao: document.getElementById('p-descricao').value,
          vara: document.getElementById('p-vara').value,
          cliente_id: parseInt(document.getElementById('p-cliente').value)
        })
      });

      if (res.ok) {
        fecharForm();
        carregarDados();
      } else {
        alert('Erro ao criar processo!');
      }
    }

    function sair() {
      localStorage.removeItem('token');
      window.location.href = '/';
    }

    carregarDados();
  </script>
</body>
</html>
